services:
  dc-ai-api:
    image: ghcr.io/dabeecao/dc-ai-api:latest
    container_name: dc-ai-api
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - ./data:/data
    environment:
      - PORT=8080
      - DATABASE_FILE=/data/proxy.db
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-your_secure_admin_password}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
    restart: unless-stopped
