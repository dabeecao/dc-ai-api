<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="lblUnlockTitle">Unlock - DC AI API Portal</title>
    <meta name="description" content="Securely access the DC AI API Proxy dashboard console. Access restricted to administrator keys.">
    <meta name="keywords" content="DC AI API, API Proxy, Key Rotator, Admin Dashboard, Go API Proxy">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='url(%23grad)'/%3E%3Cdefs%3E%3ClinearGradient id='grad' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%238b5cf6'/%3E%3Cstop offset='100%25' stop-color='%23ec4899'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cg transform='translate(4, 4) scale(0.75)'%3E%3Cpath d='M16 3L28 10V22L16 29L4 22V10L16 3Z' stroke='%23ffffff' stroke-width='2.5' stroke-linejoin='round' fill='none' /%3E%3Cpath d='M16 10L22 13V19L16 22L10 19V13L16 10Z' fill='%23ffffff' opacity='0.35' /%3E%3Ccircle cx='16' cy='16' r='3' fill='%23ffffff' /%3E%3C/g%3E%3C/svg%3E">
</head>
<body style="align-items: center; justify-content: center; display: flex; min-height: 100vh; background-attachment: fixed; position: relative;">
    
    <!-- Floating Language Selector -->
    <div style="position: absolute; top: 1.5rem; right: 1.5rem; z-index: 100;">
        <div class="language-selector-wrap" style="position: relative; display: flex; align-items: center;">
            <select id="languageSelect" class="btn btn-secondary" style="padding: 0.5rem 2.25rem 0.5rem 2.25rem; font-size: 0.875rem; appearance: none; -webkit-appearance: none; cursor: pointer; border-radius: 0.75rem; background-position: right 0.75rem center; background-repeat: no-repeat; text-transform: uppercase;">
                <option value="vi">VI</option>
                <option value="en">EN</option>
            </select>
            <i data-lucide="globe" style="position: absolute; left: 0.85rem; width: 0.9rem; height: 0.9rem; color: var(--text-secondary); pointer-events: none;"></i>
            <i data-lucide="chevron-down" style="position: absolute; right: 0.75rem; width: 0.8rem; height: 0.8rem; color: var(--text-secondary); pointer-events: none;"></i>
        </div>
    </div>

    <div class="lock-card" style="margin: 0 auto; box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5), 0 0 50px rgba(139, 92, 246, 0.08);">
        <div class="lock-logo">
            <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" style="width: 65%; height: 65%;">
                <path d="M16 3L28 10V22L16 29L4 22V10L16 3Z" stroke="#ffffff" stroke-width="2.5" stroke-linejoin="round" />
                <path d="M16 10L22 13V19L16 22L10 19V13L16 10Z" fill="#ffffff" opacity="0.35" />
                <circle cx="16" cy="16" r="3" fill="#ffffff" />
            </svg>
        </div>
        <h2 id="lblPortalTitle">DC AI API Portal</h2>
        <p id="lblLockedMessage">This console is locked. Please enter your administrator password to gain access.</p>
        <form id="loginForm" style="width: 100%; display: flex; flex-direction: column; gap: 1rem;">
            <div class="input-group">
                <input type="password" id="loginPasswordField" class="input-field" placeholder="Admin token/password..." required autocomplete="off">
            </div>
            <div id="adminTurnstileContainer" class="hidden" style="margin-top: 0.5rem; display: flex; justify-content: center; width: 100%;"></div>
            <button type="submit" class="btn btn-primary" id="lblUnlockButton" style="width: 100%;">Unlock Portal</button>
        </form>
        <div id="loginErrorMsg" style="color: var(--color-failed); font-size: 0.875rem; display: none; margin-top: 0.5rem;">
            Incorrect password. Please try again.
        </div>
    </div>
    
    <div id="toastContainer" class="toast-container"></div>

    <script type="module" src="login.js"></script>
</body>
</html>
