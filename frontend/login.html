<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unlock - DC AI API Portal</title>
    <meta name="description" content="Securely access the DC AI API Proxy dashboard console. Access restricted to administrator keys.">
    <meta name="keywords" content="DC AI API, API Proxy, Key Rotator, Admin Dashboard, Go API Proxy">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='url(%23grad)'/%3E%3Cdefs%3E%3ClinearGradient id='grad' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%238b5cf6'/%3E%3Cstop offset='100%25' stop-color='%23ec4899'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ctext x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='bold' font-size='14'%3EDC%3C/text%3E%3C/svg%3E">
</head>
<body style="align-items: center; justify-content: center; display: flex; min-height: 100vh; background-attachment: fixed;">
    <div class="lock-card" style="margin: 0 auto; box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5), 0 0 50px rgba(139, 92, 246, 0.08);">
        <div class="lock-logo">
            <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" style="width: 65%; height: 65%;">
                <path d="M16 3L28 10V22L16 29L4 22V10L16 3Z" stroke="#ffffff" stroke-width="2.5" stroke-linejoin="round" />
                <path d="M16 10L22 13V19L16 22L10 19V13L16 10Z" fill="#ffffff" opacity="0.35" />
                <circle cx="16" cy="16" r="3" fill="#ffffff" />
            </svg>
        </div>
        <h2>DC AI API Portal</h2>
        <p>This console is locked. Please enter your administrator password to gain access.</p>
        <form id="loginForm" style="width: 100%; display: flex; flex-direction: column; gap: 1rem;">
            <div class="input-group">
                <input type="password" id="loginPasswordField" class="input-field" placeholder="Admin token/password..." required autocomplete="off">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Unlock Portal</button>
        </form>
        <div id="loginErrorMsg" style="color: var(--color-failed); font-size: 0.875rem; display: none; margin-top: 0.5rem;">
            Incorrect password. Please try again.
        </div>
    </div>
    
    <div id="toastContainer" class="toast-container"></div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const loginPasswordField = document.getElementById('loginPasswordField');
        const loginErrorMsg = document.getElementById('loginErrorMsg');

        // Custom Toast Notification System
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            if (!container) return;
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `
                <div class="toast-icon"></div>
                <div class="toast-message">${escapeHtml(message)}</div>
            `;
            container.appendChild(toast);
            toast.offsetHeight; // Force reflow
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
                toast.classList.add('hide');
                toast.addEventListener('transitionend', () => {
                    toast.remove();
                });
            }, 4000);
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Check if already authenticated on load
        async function checkSession() {
            try {
                const configRes = await fetch('/admin/api/config');
                if (configRes.ok) {
                    const config = await configRes.json();
                    if (!config.auth_required) {
                        window.location.href = './';
                        return;
                    }
                    const token = localStorage.getItem('admin_token');
                    if (token) {
                        const statsRes = await fetch('/admin/api/stats', {
                            headers: {
                                'Authorization': 'Bearer ' + token,
                                'x-admin-token': token
                            }
                        });
                        if (statsRes.ok) {
                            window.location.href = './';
                        }
                    }
                }
            } catch (err) {
                console.error(err);
            }
        }
        checkSession();

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = loginPasswordField.value.trim();
            if (!password) return;

            try {
                const res = await fetch('/admin/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                const data = await res.json();
                if (res.ok && data.success) {
                    localStorage.setItem('admin_token', data.token);
                    loginErrorMsg.style.display = 'none';
                    showToast('Access granted. Welcome!', 'success');
                    setTimeout(() => {
                        window.location.href = './';
                    }, 500);
                } else {
                    loginErrorMsg.style.display = 'block';
                    loginErrorMsg.innerText = data.error || 'Incorrect password.';
                    loginPasswordField.value = '';
                    loginPasswordField.focus();
                    showToast('Incorrect password', 'error');
                }
            } catch (err) {
                loginErrorMsg.style.display = 'block';
                loginErrorMsg.innerText = 'Server error: ' + err.message;
                showToast('Login server error', 'error');
            }
        });
    </script>
</body>
</html>
